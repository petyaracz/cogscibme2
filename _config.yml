# =====================================================================
# Site configuration. Edit the values here to change site-wide settings.
# After editing this file the site must be rebuilt; on GitHub Pages this
# happens automatically a minute or two after you commit.
# =====================================================================

# Name shown in the header and browser tab.
name: Kognitív Tudományi Tanszék
# One-line description shown under the name.
description: Budapesti Műszaki és Gazdaságtudományi Egyetem

# Public URL of the site.
# TEMP (feedback hosting): served as a project site under a personal account.
# When the custom domain DNS is live, switch back to:
#   url: "https://ktt.ttk.bme.hu"
#   baseurl: ""
# and restore the CNAME file (currently renamed to CNAME.disabled).
url: "https://petyaracz.github.io"
baseurl: "/cogscibme2"

# Language of the content (used in the <html lang> attribute).
lang: hu

# --- Footer contact details (edit in one place, shown site-wide) ---
contact:
  address: 1111 Budapest, Egry József utca 1. BME T épület, 5. emelet
  phone: "+36 1 463 1273"
  email: kttinfo@ttk.bme.hu
  facebook: https://www.facebook.com/BME.KOGNITIV/

# --- Optional integrations (leave blank to disable) ---
# Disqus comment threads on news posts. Enter your Disqus shortname to turn on.
disqus:
# Google Analytics tracking ID, e.g. UA-XXXXXX or G-XXXXXX.
google_analytics:

# =====================================================================
# !! You normally do not need to change anything below this line. !!
# =====================================================================

permalink: /hirek/:title/

# Kutatócsoportok (lab) oldalak. Minden labor egy fájl a `_labs/` mappában.
# Lásd: labs.README.md
collections:
  labs:
    output: true

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

plugins:
  - jekyll-sitemap
  - jekyll-feed

# Files and folders kept out of the built site.
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - naptar.README.md
  - labs.README.md
  - CNAME
  - vendor
