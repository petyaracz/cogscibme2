---
layout: default
---

<!-- Layout for an ordinary content page (about, contact, programmes…).
     A page may set `hero: true` and `eyebrow:`/`lead:` in its front matter
     to show a branded hero band above the body. -->
{% if page.hero %}
<section class="hero">
  <div class="wrap">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lead %}<p class="sub">{{ page.lead }}</p>{% endif %}
  </div>
</section>
{% endif %}

<section class="section">
  <div class="wrap">
    <article class="page prose">
      {% unless page.hero %}<h2 class="section-title">{{ page.title }}</h2>{% endunless %}
      {{ content }}
    </article>
  </div>
</section>
